<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Student Form</title>


<!-- Manifest -->

<link rel="manifest" href="manifest.json">


<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-secondary-subtle"> <!-- Changed bg-light to bg-secondary-subtle -->


<div class="container py-5">

<div class="card shadow-sm mx-auto" style="max-width: 400px;">

<div class="card-body text-center">

<img src="icon-512.png" class="img-fluid rounded-circle w-25 h-25 " alt="Responsive image">

<h3 class="mb-4 text-primary">Teacher Student Form</h3> <!-- Added text-primary -->


<input type="text" id="teacher" class="form-control mb-3" placeholder="Teacher Name">

<input type="text" id="Student " class="form-control mb-3" placeholder="Student Name">


<button class="btn btn-success w-100" onclick="evaluateTeacher()">Submit</button> <!-- Changed btn-danger to btn-success -->


<p id="result" class="mt-3 fw-bold fs-5 text-dark-emphasis"></p> <!-- Added text-dark-emphasis -->

</div>

</div>

</div>


<script>

function evaluateTeacher() {

const teacher = document.getElementById("teacher").value.trim();

const score = Number(document.getElementById("score").value);


if (score >= 50) {

document.getElementById("result").textContent = `${teacher}: submit`; // Fixed template literal syntax (was missing quotes) - note: this was a syntax error correction, not a color change
} else {

document.getElementById("result").textContent = `${teacher}: ok`; // Fixed template literal syntax (was missing quotes) - note: this was a syntax error correction, not a color change
}

}


// Service Worker registration

if ("serviceWorker" in navigator) {

navigator.serviceWorker.register("/service-worker.js")

.then(() => console.log("Service Worker registered"))

.catch(err => console.log(" registration failed:", err));

}

</script>


</body>

</html>
