<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Student Form</title>

<link rel="manifest" href="manifest.json">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="p-4">
<img src="2.png" class="rounded  img-fluid w-25 h-25" alt="EvalApp">
<h2>Teacher Student Form</h2>

<label for="teacherName" class="form-label">Enter Your Name:</label>
<input type="text" id="teacherName" class="form-control" placeholder="Teacher Name">

<br>

<label for="studentName" class="form-label">Enter Student Name:</label>
<input type="text" id="studentName" class="form-control" placeholder="Student Name">

<br>
<label for="studentGrade" class="form-label">Enter Student Grade:</label>
<input type="text" id="studentGrade" class="form-control" placeholder="Student Grade">



<button class="btn btn-primary" onclick="window.alert('submit')">Enter</button>


<script>
 if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/service-worker.js")
          .then(() => {
            console.log("ayos! rehistro as service worker");
          })
          .catch((error) => {
            console.log("Registration failed: ", error);
          });
      }
</script>

</body>
</html>
