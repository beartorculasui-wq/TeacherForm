<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Student Form</title>


<link rel="manifest" href="manifest.json">


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-secondary-subtle">


<div class="container py-5">

<div class="card shadow-sm mx-auto" style="max-width: 400px;">

<div class="card-body text-center">

<img src="icon-512.png" class="img-fluid rounded-circle w-25 h-25 " alt="Responsive image">

<h3 class="mb-4 text-primary">Teacher Student Form</h3>


<input type="text" id="teacher" class="form-control mb-3" placeholder="Teacher Name">

<input type="text" id="student" class="form-control mb-3" placeholder="Student Name">


<button class="btn btn-success w-100" onclick="submitForm()">Submit</button>


<p id="result" class="mt-3 fw-bold fs-5 text-dark-emphasis"></p>

</div>

</div>

</div>


<script>

function submitForm() {

const teacher = document.getElementById("teacher").value.trim();
const student = document.getElementById("student").value.trim();


if (teacher && student) {
  document.getElementById("result").textContent = `Teacher: ${teacher} | Student: ${student} - Form submitted successfully`;
} else {
  document.getElementById("result").textContent = "Please fill in both Teacher and Student names";
}

}


if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("/service-worker.js")
.then(() => console.log("Service Worker registered"))
.catch(err => console.log(" registration failed:", err));
}

</script>


</body>

</html>
